<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VileCut | Chaotic Motion Machine</title>
  <meta name="description" content="VileCut is a chaotic motion machine and infinite-zoom video loop editor designed for underground music scenes like metal, industrial, and electronic. Generate seamless zoom loops, kaleidoscope mirroring, and glitch art.">
  <meta name="keywords" content="vilecut, chaotic motion machine, infinite zoom, metal music video editor, underground music visualizer, loop generator, glitch art, pixel sorting">
  <link rel="canonical" href="https://vilecut.com/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vilecut.com/">
  <meta property="og:title" content="VileCut | Chaotic Motion Machine">
  <meta property="og:description" content="VileCut is a chaotic motion machine and infinite-zoom video loop editor designed for underground music scenes like metal, industrial, and electronic. Generate seamless zoom loops, kaleidoscope mirroring, and glitch art.">
  <meta property="og:image" content="https://vilecut.com/screenshot.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://vilecut.com/">
  <meta name="twitter:title" content="VileCut | Chaotic Motion Machine">
  <meta name="twitter:description" content="VileCut is a chaotic motion machine and infinite-zoom video loop editor designed for underground music scenes like metal, industrial, and electronic. Generate seamless zoom loops, kaleidoscope mirroring, and glitch art.">
  <meta name="twitter:image" content="https://vilecut.com/screenshot.png">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "VileCut",
    "alternateName": "Chaotic Motion Machine",
    "url": "https://vilecut.com/",
    "image": "https://vilecut.com/screenshot.png",
    "description": "A browser-based web application that parses static images into detail-balanced depth bands and renders them in an infinite exponential zoom camera tunnel to create seamless loop videos for underground music scenes like metal, industrial, and electronic.",
    "applicationCategory": "MultimediaApplication",
    "operatingSystem": "All",
    "browserRequirements": "Requires a modern web browser with WebCodecs support.",
    "offers": {
      "@type": "Offer",
      "price": "0.00",
      "priceCurrency": "USD"
    }
  }
  </script>
  
  <style>
    /* Ultra-lightweight styling specifically for the landing/mobile check page */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: #060913;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 20px;
    }

    #loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    /* Mobile Warning Card */
    .mobile-card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255, 0, 128, 0.3);
      border-radius: 12px;
      padding: 30px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 0, 128, 0.1);
      display: none; /* Hidden by default until JS detects mobile */
    }

    .mobile-card h2 {
      color: #ff0080;
      margin-bottom: 15px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .mobile-card p {
      margin-bottom: 25px;
      line-height: 1.6;
      color: #e2e8f0;
      font-size: 1rem;
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
    }

    .btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Lucide icons placeholder styling */
    .icon {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
  </style>
</head>
<body>
  
  <noscript>
    <div style="text-align: center; padding: 40px 20px; background: #060913; color: #e2e8f0; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <h1 style="color: #00f2fe; font-size: 2.5rem; margin-bottom: 20px; letter-spacing: 2px;">VILECUT</h1>
      <p style="max-width: 600px; line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; color: #94a3b8;">
        VileCut is an infinite-zoom video loops editor designed for underground music scenes like metal, industrial, and electronic. Create custom chaotic zoom motion visuals, kaleidoscope symmetry, and pixel-sorting glitch art.
      </p>
      <a href="vilecut.html" style="display: inline-block; background: #ff0080; color: #ffffff; padding: 12px 30px; border-radius: 6px; font-weight: bold; text-decoration: none; box-shadow: 0 0 15px rgba(255, 0, 128, 0.4);">
        Enter VileCut App
      </a>
    </div>
  </noscript>

  <!-- Loading State (Briefly shown before redirecting desktop users) -->
  <div id="loading-state">
    <h1 style="color: #00f2fe; font-size: 2rem; margin: 0; letter-spacing: 2px;">VILECUT</h1>
    <p style="color: #94a3b8; font-size: 0.9rem;">Initializing Engine...</p>
  </div>

  <!-- Mobile Warning Card -->
  <div id="mobile-warning" class="mobile-card">
    <h2>
      <svg class="icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line><line x1="1" y1="1" x2="23" y2="23"></line></svg>
      Desktop Recommended
    </h2>
    <p>
      VileCut is a complex motion machine with a heavy timeline, rendering load, and multi-track UI. It is designed specifically for desktop browsers.<br><br>
      For the best experience, please open this site on a computer.
    </p>
    <button id="btn-proceed" class="btn">I understand, proceed anyway</button>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Extremely simple and fast mobile check
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
      
      if (isMobile) {
        // If mobile, hide loading and show the clean warning
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('mobile-warning').style.display = 'block';
        
        // Add listener to proceed anyway
        document.getElementById('btn-proceed').addEventListener('click', function() {
          window.location.href = 'vilecut.html';
        });
      } else {
        // If desktop, instantly redirect to the actual app
        window.location.replace('vilecut.html');
      }
    });
  </script>
</body>
</html>
